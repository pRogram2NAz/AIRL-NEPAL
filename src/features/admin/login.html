<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Area – AIRL Nepal</title>
  <meta name="description" content="Administration Panel Login – Agri-Intelligence Research Lab (AIRL) Nepal." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-emerald-100/60 relative overflow-hidden">
    <!-- Header visual strip -->
    <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-emerald-500 to-teal-600"></div>

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-50 text-emerald-600 rounded-full mb-3">
        <i data-lucide="shield-check" class="w-8 h-8"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">AIRL Admin Portal</h1>
      <p class="text-sm text-gray-500 mt-1">Authorized access only</p>
    </div>

    <!-- Live validation messages -->
    <div id="alertBanner" class="hidden mb-6 p-4 rounded-xl text-sm flex items-start gap-3">
      <i id="alertIcon" class="w-5 h-5 shrink-0 mt-0.5"></i>
      <span id="alertMessage"></span>
    </div>

    <form id="adminLoginForm" novalidate class="space-y-5">
      <div>
        <label for="adminUser" class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
        <div class="relative">
          <input type="text" id="adminUser" class="w-full pl-10 pr-4 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition" placeholder="Enter username" />
          <i data-lucide="user" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
        </div>
      </div>

      <div>
        <label for="adminPass" class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
        <div class="relative">
          <input type="password" id="adminPass" class="w-full pl-10 pr-10 py-2.5 bg-gray-50/50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition" placeholder="••••••••" />
          <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
          <button type="button" id="togglePasswordBtn" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
            <i data-lucide="eye" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="w-full py-3 bg-gradient-to-r from-emerald-600 to-teal-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-emerald-700/10 hover:shadow-emerald-700/20 hover:from-emerald-700 hover:to-teal-800 transition-all flex items-center justify-center gap-2">
        Authenticate <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </button>
    </form>
    
    <div class="text-center mt-6">
      <a href="../home/index.html" class="inline-flex items-center gap-1.5 text-xs font-semibold text-emerald-600 hover:text-emerald-700">
        <i data-lucide="home" class="w-3.5 h-3.5"></i> Back to Homepage
      </a>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
